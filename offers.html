<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meghaa Makeovers – Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<body>
  <header class="app-header"> <!-- same as others --> </header>
  <div class="menu-overlay" id="menuOverlay"> <!-- same --> </div>

  <main class="container">
    <h2>Our Work</h2>
    <!-- category filters -->
    <div class="filter-tabs">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="bridal">Bridal</button>
      <button class="filter-btn" data-filter="party">Party Makeup</button>
      <button class="filter-btn" data-filter="hair">Hair Styling</button>
      <button class="filter-btn" data-filter="facial">Facial</button>
    </div>

    <!-- gallery grid with placeholders -->
    <div class="gallery-grid" id="galleryGrid">
      <span class="dynamic-placeholder">{{gallery}}</span>
      <!-- demo items with data-category -->
      <div class="gallery-item" data-category="bridal" style="background-image:url('https://images.unsplash.com/photo-1501127122-f385ca6ddd9d?w=200');"></div>
      <div class="gallery-item" data-category="bridal" style="background-image:url('https://images.unsplash.com/photo-1487412947147-5cebf100ffc2?w=200');"></div>

      <div class="gallery-item" data-category="party" style="background-image:url('https://images.unsplash.com/photo-1507652313519-d4e9174996dd?w=200');"></div>
      <div class="gallery-item" data-category="hair" style="background-image:url('https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=200');"></div>
      <div class="gallery-item" data-category="hair" style="background-image:url('https://images.unsplash.com/photo-1595476108010-b4d1f102b1b1?w=200');"></div>
      <div class="gallery-item" data-category="facial" style="background-image:url('https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?w=200');"></div>
      <div class="gallery-item" data-category="facial" style="background-image:url('https://images.unsplash.com/photo-1519415387722-1f3bb2d2285d?w=200');"></div>
      <div class="gallery-item" data-category="bridal" style="background-image:url('https://images.unsplash.com/photo-1501127122-f385ca6ddd9d?w=200');"></div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><i class="fa-regular fa-house"></i><span>Home</span></a>
    <a href="services.html" class="nav-item"><i class="fa-regular fa-spa"></i><span>Services</span></a>

    <a href="profile.html" class="nav-item"><i class="fa-regular fa-user"></i><span>Profile</span></a>
