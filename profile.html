<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meghaa Makeovers – Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header"> <!-- same --> </header>
  <div class="menu-overlay" id="menuOverlay"> <!-- same --> </div>

  <main class="container">
    <h2>Profile</h2>

    <!-- Login / Register tabs -->
    <div class="profile-tabs">
      <button class="tab-btn active" data-tab="login">Login</button>
      <button class="tab-btn" data-tab="register">Register</button>
    </div>

    <!-- Login pane -->
    <div id="login" class="tab-pane active">
      <div class="dashboard-card">
        <form>
          <div class="form-group"><label>Email</label><input type="email" placeholder="your@email.com"></div>
          <div class="form-group"><label>Password</label><input type="password" placeholder="••••••••"></div>
          <button type="button" class="btn" id="demoLoginBtn" style="width:100%;">Login (demo)</button>
        </form>
      </div>
    </div>

    <!-- Register pane -->
    <div id="register" class="tab-pane">
      <div class="dashboard-card">
        <form>
          <div class="form-group"><label>Full Name</label><input type="text"></div>
          <div class="form-group"><label>Phone</label><input type="tel"></div>
          <div class="form-group"><label>Email</label><input type="email"></div>
          <div class="form-group"><label>Password</label><input type="password"></div>
          <button type="button" class="btn" style="width:100%;">Register</button>
        </form>
      </div>
    </div>

    <!-- Dashboard (hidden initially, shown after demo login) -->
    <div class="dashboard-section" style="display: none;">
      <div class="dashboard-card">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <div><i class="fa-regular fa-circle-user" style="font-size: 3rem; color: var(--deep-blue);"></i></div>
          <div>
            <h3>Meghaa Client</h3>
            <p>client@email.com · +91 98765 43210</p>
            <span class="points-badge">Loyalty points: 250</span>
          </div>
        </div>
        <p style="margin-top:1rem;">Referral code: <strong>MEGHAA10</strong></p>
      </div>

      <ul class="menu-list">
        <li><a href="#"><i class="fa-regular fa-calendar"></i> My Bookings <span class="dynamic-placeholder">{{user_bookings}}</span></a></li>
        <li><a href="#"><i class="fa-regular fa-crown"></i> Membership <span class="dynamic-placeholder">{{membership_plans}}</span></a></li>
        <li><a href="#" id="demoLogoutBtn"><i class="fa-regular fa-arrow-right-from-bracket"></i> Logout</a></li>
      </ul>

      <!-- demo membership plan card -->
      <div class="dashboard-card">
        <h3>Gold Membership</h3>
        <p>₹999/year – Priority booking, 10% off</p>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><i class="fa-regular fa-house"></i><span>Home</span></a>
    <a href="services.html" class="nav-item"><i class="fa-regular fa-spa"></i><span>Services</span></a>
    <a href="booking.html" class="nav-item"><i class="fa-regular fa-calendar-check"></i><span>Book</span></a>
    <a href="gallery.html" class="nav-item"><i class="fa-regular fa-image"></i><span>Gallery</span></a>
    <a href="profile.html" class="nav-item active"><i class="fa-regular fa-user"></i><span>Profile</span></a>
  </nav>

  <button class="pwa-install-floating" id="pwaInstallBtn"><i class="fa-regular fa-mobile-notch"></i> Install app</button>
  <footer class="footer"> <!-- same --> </footer>
  <script src="assets/js/app.js"></script>
  <script>
    document.getElementById('installTopBtn')?.addEventListener('click', ()=> alert('Install Meghaa Makeovers app (PWA prompt)'));
  </script>
</body>

</html>
